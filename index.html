<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Piano Application</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header>
      <h1>Piano</h1>
    </header>
    <div class="wrapper">
      <div class="piano">
        <div data-note="C" class="white key">
          <span class="note-label">C</span>
          <audio src="notes (1)/notes/C.mp3" id="C"></audio>
        </div>
        <div data-note="Db" class="black key">
          <span class="note-label">Db</span>
          <audio src="notes (1)/notes/Db.mp3" id="Db"></audio>
        </div>
        <div data-note="D" class="white key">
          <span class="note-label">D</span>
          <audio src="notes (1)/notes/D.mp3" id="D"></audio>
        </div>
        <div data-note="Eb" class="black key">
          <span class="note-label">Eb</span>
          <audio src="notes (1)/notes/Eb.mp3" id="Eb"></audio>
        </div>
        <div data-note="E" class="white key">
          <span class="note-label">E</span>
          <audio src="notes (1)/notes/E.mp3" id="E"></audio>
        </div>
        <div data-note="F" class="white key">
          <span class="note-label">F</span>
          <audio src="notes (1)/notes/F.mp3" id="F"></audio>
        </div>
        <div data-note="Gb" class="black key">
          <span class="note-label">Gb</span>
          <audio src="notes (1)/notes/Gb.mp3" id="Gb"></audio>
        </div>
        <div data-note="G" class="white key">
          <span class="note-label">G</span>
          <audio src="notes (1)/notes/G.mp3" id="G"></audio>
        </div>
        <div data-note="Ab" class="black key">
          <span class="note-label">Ab</span>
          <audio src="notes (1)/notes/Ab.mp3" id="Ab"></audio>
        </div>
        <div data-note="A" class="white key">
          <span class="note-label">A</span>
          <audio src="notes (1)/notes/A.mp3" id="A"></audio>
        </div>
        <div data-note="Bb" class="black key">
          <span class="note-label">Bb</span>
          <audio src="notes (1)/notes/Bb.mp3" id="Bb"></audio>
        </div>
        <div data-note="B" class="white key">
          <span class="note-label">B</span>
          <audio src="notes (1)/notes/B.mp3" id="B"></audio>
        </div>
      </div>
    </div>
    <script src="script.js"></script>
  </body>
</html>
